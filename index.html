<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะบอร์ดเกมของเรา</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #ffe066 0%, #c471ed 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px; 
            color: #333; 
        }
        .container { 
            max-width: 850px; 
            margin: auto; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            backdrop-filter: blur(10px);
        }
        
        h2 { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid #f0f0f0; padding-bottom: 15px; margin-top: 0;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .web-logo { height: 60px; width: auto; border-radius: 12px; object-fit: cover; }
        
        #loginBtn { cursor: pointer; border: none; background: transparent; padding: 0; transition: transform 0.2s; }
        #loginBtn:hover { transform: scale(1.05) translateY(-2px); }
        #loginBtn img { height: 50px; border-radius: 10px; }
        #loginBtn.btn-danger-mode { background-color: #ff4757; color: white; padding: 10px 16px; border-radius: 8px; font-weight: bold; }

        .btn-warning { background-color: #ffa502; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-danger { background-color: #ff4757; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #saveBtn { cursor: pointer; padding: 12px 20px; border: none; border-radius: 8px; background-color: #8a2be2; color: white; font-weight: bold; width: 100%; margin-top: 5px;}
        
        /* สไตล์ตาราง */
        .table-responsive { width: 100%; overflow-x: hidden; margin-top: 25px; background: white; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; vertical-align: middle; }
        th { background-color: #f8f9fa; color: #555; text-transform: uppercase; font-size: 0.9em; }
        img.game-pic { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; }
        
        /* สไตล์ฟอร์ม Admin */
        #adminPanel { display: none; background: #f8f9fa; padding: 20px; border-radius: 12px; margin: 25px 0; border: 1px solid #eaeaea; }
        .admin-inputs { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        /* 🌟 ปุ่มอัปโหลดรูปที่ตกแต่งใหม่ */
        input[type="file"] { display: none; /* ซ่อนปุ่มเดิมที่ดูไม่สวย */ }
        .custom-file-upload {
            flex: 1;
            border: 2px dashed #c471ed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 8px;
            color: #8a2be2;
            font-size: 14px;
            font-weight: bold;
            background: white;
            transition: all 0.2s;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .custom-file-upload:hover { background: #fdf5ff; border-color: #8a2be2; }

        .admin-controls { display: none; }
        .status-badge { background: #e0f7fa; padding: 8px 12px; border-radius: 20px; font-weight: bold; color: #006064; display: inline-block; font-size: 0.9em; }

        /* 📱 RESPONSIVE DESIGN: สำหรับมือถือ */
        @media (max-width: 768px) {
            body { padding: 10px 5px; }
            .container { padding: 15px 10px; }
            h2 { flex-direction: column; gap: 10px; text-align: center; }
            .header-left { flex-direction: column; }
            .admin-inputs { flex-direction: column; } /* จัดปุ่มให้เรียงลงมาแนวตั้งบนมือถือ */
            
            th, td { padding: 8px 4px; font-size: 12px; word-break: break-word; }
            th { font-size: 11px; } 
            img.game-pic { width: 45px; height: 45px; border-radius: 6px; }
            
            .status-badge { padding: 4px 6px; font-size: 11px; white-space: normal; }
            .btn-warning, .btn-danger { padding: 4px; font-size: 11px; display: block; width: 100%; margin-bottom: 4px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>
        <div class="header-left">
            <img src="https://sntbvvyafvcieopsdklc.supabase.co/storage/v1/object/public/images/f4ebcd81-7ef8-4cb3-80b2-1213ae26b578.jpg" class="web-logo" alt="Logo">
            <span class="web-title">Boardgame Station</span>
        </div>
        <button id="loginBtn" onclick="toggleAdmin()">
            <img src="https://t3.ftcdn.net/jpg/09/86/19/94/360_F_986199439_HWPZ4YtWmnR9h1FXSJXuqhXpLy7Kh0rb.jpg" alt="Admin Login">
        </button>
    </h2>

    <div id="adminPanel">
        <h3 style="margin-top: 0; color: #8a2be2;">➕ เพิ่มบอร์ดเกมใหม่</h3>
        <div class="admin-inputs">
            <input type="text" id="gameName" placeholder="ชื่อบอร์ดเกม (ต้องระบุ)">
            
            <label class="custom-file-upload">
                <span id="fileNameDisplay">📸 อัปโหลดรูปหน้ากล่องเกม</span>
                <input type="file" id="gameImgFile" accept="image/*" onchange="updateFileName()">
            </label>
            
            <input type="text" id="gameHolder" placeholder="อยู่กับใคร... (ต้องระบุ)">
        </div>
        <button id="saveBtn" onclick="addGame()">💾 บันทึกเกมใหม่</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">รูป</th>
                    <th style="width: 35%;">ชื่อเกม</th>
                    <th style="width: 25%;">อยู่ที่ใคร</th>
                    <th class="admin-controls" style="width: 25%;">จัดการ</th>
                </tr>
            </thead>
            <tbody id="gameTableBody">
                <tr><td colspan="4" style="text-align: center; padding: 30px;">กำลังโหลด... ⏳</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const mySupabaseUrl = 'https://sntbvvyafvcieopsdklc.supabase.co';
    const mySupabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNudGJ2dnlhZnZjaWVvcHNka2xjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzY3NDgsImV4cCI6MjA4OTMxMjc0OH0.leGtwyXdGHY_3rGBTTNdNaDhFcq2Ic-buKoVOe-EFyM';
    const mySupabase = window.supabase.createClient(mySupabaseUrl, mySupabaseKey);

    let isAdmin = false;
    let gamesData = [];
    const adminImageBtnHtml = `<img src="https://t3.ftcdn.net/jpg/09/86/19/94/360_F_986199439_HWPZ4YtWmnR9h1FXSJXuqhXpLy7Kh0rb.jpg" alt="Admin Login">`;

    function toggleAdmin() {
        const btn = document.getElementById('loginBtn');
        if (isAdmin) {
            isAdmin = false;
            btn.innerHTML = adminImageBtnHtml;
            btn.classList.remove('btn-danger-mode');
            document.getElementById('adminPanel').style.display = "none";
            renderTable(); return;
        }
        const password = prompt("รหัสผ่าน Admin:");
        if (password === "113333555555") {
            isAdmin = true;
            btn.innerHTML = "🔴 ออกจากระบบ";
            btn.classList.add('btn-danger-mode');
            document.getElementById('adminPanel').style.display = "block";
            renderTable(); 
        } else if (password !== null) { alert("รหัสผิด!"); }
    }

    // ฟังก์ชันเปลี่ยนชื่อปุ่มอัปโหลดเวลากดเลือกรูปเสร็จ
    function updateFileName() {
        const input = document.getElementById('gameImgFile');
        const display = document.getElementById('fileNameDisplay');
        if (input.files && input.files.length > 0) {
            display.innerText = "✅ เลือกรูปแล้ว: " + input.files[0].name;
            display.parentElement.style.borderColor = "#2ed573";
            display.parentElement.style.color = "#2ed573";
        } else {
            resetFileButton();
        }
    }

    function resetFileButton() {
        const display = document.getElementById('fileNameDisplay');
        display.innerText = "📸 อัปโหลดรูปหน้ากล่องเกม";
        display.parentElement.style.borderColor = "#c471ed";
        display.parentElement.style.color = "#8a2be2";
        document.getElementById('gameImgFile').value = '';
    }

    async function fetchGames() {
        const { data, error } = await mySupabase.from('boardgames').select('*').order('id', { ascending: false });
        if (!error) { gamesData = data; renderTable(); }
    }

    function renderTable() {
        const tbody = document.getElementById('gameTableBody');
        tbody.innerHTML = ''; 
        if (gamesData.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 20px;">ไม่มีข้อมูล</td></tr>'; return; }

        gamesData.forEach(game => {
            const imgUrl = game.image_url || 'https://placehold.co/80x80?text=No+Img';
            let row = `<tr>
                <td><img src="${imgUrl}" class="game-pic"></td>
                <td><strong style="color: #222;">${game.name}</strong></td>
                <td><span class="status-badge">${game.holder}</span></td>`;
            if (isAdmin) {
                row += `<td class="admin-controls">
                    <button class="btn-warning" onclick="changeStatus(${game.id}, '${game.holder}')">เปลี่ยน</button>
                    <button class="btn-danger" onclick="deleteGame(${game.id})">ลบ</button>
                </td>`;
            }
            row += `</tr>`;
            tbody.innerHTML += row;
        });
        document.querySelectorAll('.admin-controls').forEach(el => el.style.display = isAdmin ? 'table-cell' : 'none');
    }

    async function addGame() {
        const n = document.getElementById('gameName').value.trim();
        const h = document.getElementById('gameHolder').value.trim();
        const f = document.getElementById('gameImgFile').files[0];
        
        if (!n || !h) { alert('กรุณาระบุชื่อเกม และคนที่ถือเกมให้ครบถ้วนครับ!'); return; }
        
        document.getElementById('saveBtn').innerText = "⏳ กำลังบันทึก...";
        let img = "";
        if (f) {
            const p = `${Date.now()}.${f.name.split('.').pop()}`;
            await mySupabase.storage.from('images').upload(p, f);
            img = mySupabase.storage.from('images').getPublicUrl(p).data.publicUrl;
        }
        
        await mySupabase.from('boardgames').insert([{ name: n, image_url: img, holder: h }]);
        
        // เคลียร์ค่าหลังจากบันทึกเสร็จ
        document.getElementById('gameName').value = ''; 
        document.getElementById('gameHolder').value = ''; 
        resetFileButton(); // รีเซ็ตปุ่มรูปภาพให้กลับมาเป็นเหมือนเดิม
        
        document.getElementById('saveBtn').innerText = "💾 บันทึกเกมใหม่";
        fetchGames();
    }

    async function changeStatus(id, cur) {
        const n = prompt("อยู่ที่ใคร:", cur);
        if (n && n !== cur) { await mySupabase.from('boardgames').update({ holder: n.trim() }).eq('id', id); fetchGames(); }
    }

    async function deleteGame(id) {
        if (confirm("ลบเกมนี้?")) { await mySupabase.from('boardgames').delete().eq('id', id); fetchGames(); }
    }

    fetchGames();
</script>

</body>
</html>
