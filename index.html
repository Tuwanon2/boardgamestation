<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานะบอร์ดเกมของเรา</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS ปรับโฉมใหม่ให้สวยงาม โมเดิร์น */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* พื้นหลังไล่สี เหลือง-ม่วง แบบสวยๆ */
            background: linear-gradient(135deg, #ffe066 0%, #c471ed 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px; 
            color: #333; 
        }
        .container { 
            max-width: 850px; 
            margin: auto; 
            /* กล่องสีขาวแบบโปร่งแสงนิดๆ (Glassmorphism) */
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            backdrop-filter: blur(10px);
        }
        h2 { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid #f0f0f0;
            padding-bottom: 15px;
            margin-top: 0;
            color: #4a4a4a;
        }
        button { 
            cursor: pointer; 
            padding: 10px 16px; 
            border: none; 
            border-radius: 8px; 
            background-color: #8a2be2; /* ปุ่มสีม่วง */
            color: white; 
            font-weight: bold;
            transition: all 0.2s ease;
        }
        button:hover { background-color: #721bbd; transform: translateY(-2px); }
        .btn-danger { background-color: #ff4757; }
        .btn-danger:hover { background-color: #ff6b81; }
        .btn-warning { background-color: #ffa502; color: white; }
        .btn-warning:hover { background-color: #ff7f50; }
        
        /* สไตล์ตาราง */
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; vertical-align: middle; }
        th { background-color: #f8f9fa; color: #555; text-transform: uppercase; font-size: 0.9em; }
        tr:hover { background-color: #fcfcfc; }
        img.game-pic { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 2px solid #f0f0f0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* สไตล์ส่วนของ Admin */
        #adminPanel { 
            display: none; 
            background: linear-gradient(to right, #f8f9fa, #ffffff); 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            margin-top: 25px;
            border: 1px solid #eaeaea;
        }
        .admin-inputs {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }
        input[type="text"] { 
            flex: 1;
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #8a2be2; outline: none; }
        input[type="file"] { flex: 1; font-size: 14px; }
        
        .admin-controls { display: none; }
        .status-badge {
            background: #e0f7fa; 
            padding: 8px 12px; 
            border-radius: 20px; 
            font-weight: bold; 
            color: #006064;
            display: inline-block;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>
        🎲 สถานะบอร์ดเกมของเรา
        <button id="loginBtn" onclick="toggleAdmin()">⚙️ สำหรับ Admin</button>
    </h2>

    <div id="adminPanel">
        <h3 style="margin-top: 0; color: #8a2be2;">➕ เพิ่มบอร์ดเกมใหม่</h3>
        <div class="admin-inputs">
            <input type="text" id="gameName" placeholder="ชื่อบอร์ดเกม (เช่น Catan)">
            <input type="file" id="gameImgFile" accept="image/*">
            <input type="text" id="gameHolder" placeholder="สถานะ (เช่น อยู่ที่ตู้, พี่ A ยืม)">
        </div>
        <button id="saveBtn" onclick="addGame()">💾 บันทึกเกมใหม่</button>
    </div>

    <table>
        <thead>
            <tr>
                <th width="110">รูปภาพ</th>
                <th>ชื่อเกม</th>
                <th>สถานะ / อยู่ที่ใคร</th>
                <th class="admin-controls" width="180">จัดการ (Admin)</th>
            </tr>
        </thead>
        <tbody id="gameTableBody">
            <tr><td colspan="4" style="text-align: center; padding: 30px; color: #888;">กำลังโหลดข้อมูล... ⏳</td></tr>
        </tbody>
    </table>
</div>

<script>
    // เชื่อมต่อ Supabase
    const mySupabaseUrl = 'https://sntbvvyafvcieopsdklc.supabase.co';
    const mySupabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNudGJ2dnlhZnZjaWVvcHNka2xjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzY3NDgsImV4cCI6MjA4OTMxMjc0OH0.leGtwyXdGHY_3rGBTTNdNaDhFcq2Ic-buKoVOe-EFyM';
    const mySupabase = window.supabase.createClient(mySupabaseUrl, mySupabaseKey);

    let isAdmin = false;
    let gamesData = [];

    function toggleAdmin() {
        if (isAdmin) {
            isAdmin = false;
            document.getElementById('loginBtn').innerText = "⚙️ สำหรับ Admin";
            document.getElementById('loginBtn').style.backgroundColor = "#8a2be2";
            document.getElementById('adminPanel').style.display = "none";
            renderTable(); 
            return;
        }

        const password = prompt("กรุณาใส่รหัสผ่าน Admin:");
        if (password === "1234") {
            isAdmin = true;
            document.getElementById('loginBtn').innerText = "🔴 ออกจากระบบ Admin";
            document.getElementById('loginBtn').style.backgroundColor = "#ff4757";
            document.getElementById('adminPanel').style.display = "block";
            renderTable(); 
        } else if (password !== null) {
            alert("รหัสผ่านไม่ถูกต้อง!");
        }
    }

    async function fetchGames() {
        const { data, error } = await mySupabase
            .from('boardgames')
            .select('*')
            .order('id', { ascending: false });
        
        if (error) {
            console.error("Error fetching data:", error);
            document.getElementById('gameTableBody').innerHTML = '<tr><td colspan="4" style="text-align: center; color: red;">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
            return;
        }

        gamesData = data;
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('gameTableBody');
        tbody.innerHTML = ''; 

        if (gamesData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 30px; color: #888;">ยังไม่มีบอร์ดเกมในระบบ ลองเพิ่มดูสิ! 🎲</td></tr>';
            return;
        }

        gamesData.forEach(game => {
            const defaultImg = 'https://placehold.co/80x80?text=No+Img';
            const imgUrl = game.image_url ? game.image_url : defaultImg;

            let row = `<tr>
                <td><img src="${imgUrl}" class="game-pic" alt="${game.name}"></td>
                <td><strong style="font-size: 1.1em; color: #222;">${game.name}</strong></td>
                <td><span class="status-badge">${game.holder}</span></td>`;
            
            if (isAdmin) {
                row += `<td>
                    <button class="btn-warning" style="margin-bottom: 5px;" onclick="changeStatus(${game.id}, '${game.holder}')">✏️ เปลี่ยนสถานะ</button>
                    <button class="btn-danger" onclick="deleteGame(${game.id})">🗑️ ลบ</button>
                </td>`;
            }
            row += `</tr>`;
            tbody.innerHTML += row;
        });

        const adminHeaders = document.querySelectorAll('.admin-controls');
        adminHeaders.forEach(el => el.style.display = isAdmin ? 'table-cell' : 'none');
    }

    // ฟังก์ชันเพิ่มบอร์ดเกม + อัปโหลดรูปภาพ
    async function addGame() {
        const name = document.getElementById('gameName').value.trim();
        const holder = document.getElementById('gameHolder').value.trim();
        const fileInput = document.getElementById('gameImgFile');
        const file = fileInput.files[0];

        if (!name || !holder) {
            alert('กรุณาใส่ "ชื่อเกม" และ "สถานะ" ให้ครบถ้วนครับ');
            return;
        }

        const btn = document.getElementById('saveBtn');
        btn.innerText = "⏳ กำลังอัปโหลดและบันทึก...";
        btn.disabled = true;
        btn.style.opacity = "0.7";

        let finalImageUrl = "";

        // ถ้ามีการเลือกไฟล์รูปภาพ ให้ทำการอัปโหลดก่อน
        if (file) {
            // ตั้งชื่อไฟล์ใหม่ให้ไม่ซ้ำกัน (ใช้เวลาปัจจุบัน)
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;
            const filePath = `${fileName}`; // เก็บในโฟลเดอร์หลักของ Bucket

            // 1. อัปโหลดรูปเข้า Storage ที่ชื่อ 'images'
            const { data: uploadData, error: uploadError } = await mySupabase.storage
                .from('images') // ชื่อ Bucket ต้องตรงกับที่สร้างใน Supabase
                .upload(filePath, file);

            if (uploadError) {
                console.error("Upload Error:", uploadError);
                alert('อัปโหลดรูปล้มเหลว! ตรวจสอบว่าสร้าง Bucket ชื่อ "images" และตั้งเป็น Public หรือยังครับ');
                resetButton(btn);
                return;
            }

            // 2. ดึง URL ของรูปที่อัปโหลดเสร็จมาใช้งาน
            const { data: publicUrlData } = mySupabase.storage
                .from('images')
                .getPublicUrl(filePath);
            
            finalImageUrl = publicUrlData.publicUrl;
        }

        // 3. บันทึกข้อมูล (ชื่อเกม, URLรูป, สถานะ) ลงฐานข้อมูล
        const { error } = await mySupabase
            .from('boardgames')
            .insert([{ name: name, image_url: finalImageUrl, holder: holder }]);
        
        resetButton(btn);

        if (error) {
            console.error(error);
            alert('เกิดข้อผิดพลาดในการเพิ่มข้อมูลลงฐานข้อมูล!');
        } else {
            // ล้างข้อมูลในช่องกรอก และโหลดตารางใหม่
            document.getElementById('gameName').value = '';
            fileInput.value = '';
            document.getElementById('gameHolder').value = '';
            fetchGames(); 
        }
    }

    function resetButton(btn) {
        btn.innerText = "💾 บันทึกเกมใหม่";
        btn.disabled = false;
        btn.style.opacity = "1";
    }

    async function changeStatus(id, currentHolder) {
        const newHolder = prompt("อัปเดตสถานะ/คนที่เก็บกล่อง:", currentHolder);
        if (newHolder === null || newHolder.trim() === "" || newHolder === currentHolder) return;

        const { error } = await mySupabase
            .from('boardgames')
            .update({ holder: newHolder.trim() })
            .eq('id', id);

        if (error) { console.error(error); alert('อัปเดตสถานะไม่สำเร็จ!'); } 
        else { fetchGames(); }
    }

    async function deleteGame(id) {
        if (confirm("แน่ใจหรือไม่ว่าต้องการลบเกมนี้ออกจากระบบ?")) {
            const { error } = await mySupabase.from('boardgames').delete().eq('id', id);
            if (error) { console.error(error); alert('ลบข้อมูลไม่สำเร็จ!'); } 
            else { fetchGames(); }
        }
    }

    fetchGames();
</script>

</body>
</html>
